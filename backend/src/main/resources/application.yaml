spring:
  application:
    name: svt
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/svt
    password: ${POSTGRES_PASSWORD}
    username: ${POSTGRES_USERNAME}
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: create
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          time_zone: UTC
  jackson:
    time-zone: UTC
  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH:false}
          starttls:
            enable: ${MAIL_SMTP_STARTTLS_ENABLE:false}

jwt:
  secret: ${JWT_SECRET}
  expiration: 3600

app:
  frontend-url: ${APP_FRONTEND_URL:http://localhost:4200}
  mail:
    from: ${MAIL_FROM:no-reply@sitapp.local}
