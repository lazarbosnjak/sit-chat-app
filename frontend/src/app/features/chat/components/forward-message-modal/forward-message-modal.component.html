<app-modal title="Forward message" (close)="close.emit()">
  @if (message(); as messageToForward) {
    <div class="mb-4 rounded-lg border-l-4 border-blue-500 bg-gray-50 px-3 py-2">
      <p class="text-xs font-semibold text-blue-700">
        Forwarding {{ messageToForward.sender.fullName }}
      </p>
      <p
        class="mt-0.5 max-h-16 overflow-hidden whitespace-pre-wrap wrap-break-words text-sm text-gray-700"
      >
        {{ messageToForward.content }}
      </p>
    </div>
  }

  <div class="max-h-80 space-y-2 overflow-y-auto">
    @if (chats().length === 0) {
      <p class="py-6 text-center text-sm text-gray-500">No other chats available.</p>
    }

    @for (chat of chats(); track chat.id) {
      <button
        type="button"
        class="flex w-full items-center gap-3 rounded-lg p-3 text-left transition hover:bg-gray-100"
        (click)="forward.emit(chat)"
      >
        @if (chatService.getChatPfpUrl(chat)) {
          <img
            [src]="chatService.getChatPfpUrl(chat)"
            alt="Chat image"
            class="h-10 w-10 rounded-full object-cover"
          />
        } @else {
          <div
            class="flex h-10 w-10 items-center justify-center rounded-full bg-blue-100 text-sm font-semibold text-blue-700"
          >
            {{ chatService.getChatTitle(chat).charAt(0) }}
          </div>
        }

        <div class="min-w-0">
          <p class="truncate font-medium">{{ chatService.getChatTitle(chat) }}</p>
          <p class="truncate text-sm text-gray-500">
            {{ chat.type === 'GROUP' ? 'Group' : 'Direct chat' }}
          </p>
        </div>
      </button>
    }
  </div>
</app-modal>
