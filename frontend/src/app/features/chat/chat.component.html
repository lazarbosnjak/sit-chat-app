<div class="flex h-screen bg-gray-100 text-gray-900">
  <app-sidebar [selectedChatId]="selectedChatId()" class="h-full shrink-0" />

  <main class="flex min-w-0 flex-1 flex-col">
    <app-chat-header
      [chat]="chat()"
      [directRecipient]="getDirectRecipient()"
      [title]="chatTitle()"
      [image]="chatImage()"
      (openUserProfile)="openUserProfile($event)"
      (openGroupSettings)="openGroupSettingsModal()"
    />

    <app-message-list
      [messages]="messages()"
      [currentUserId]="currentUser()?.id ?? null"
      [reactionOptions]="reactionOptions"
      [audioObjectUrls]="audioObjectUrls()"
      (openUserProfile)="openUserProfile($event)"
      (startReply)="startReply($event)"
      (openForward)="openForwardModal($event)"
      (toggleStarred)="toggleStarredMessage($event)"
      (react)="reactToMessage($event.message, $event.type)"
    />

    <app-message-composer
      [replyingTo]="replyingTo()"
      [isRecordingAudio]="isRecordingAudio()"
      [isUploadingVoiceMessage]="isUploadingVoiceMessage()"
      [audioRecordingError]="audioRecordingError()"
      (sendText)="sendMessage($event)"
      (toggleAudioRecording)="toggleAudioRecording()"
      (cancelReply)="cancelReply()"
    />
  </main>
</div>

@if (isForwardModalOpen()) {
  <app-forward-message-modal
    [message]="forwardingMessage()"
    [chats]="getForwardableChats()"
    (close)="closeForwardModal()"
    (forward)="forwardMessage($event)"
  />
}

@if (isUserProfileModalOpen()) {
  <app-user-profile-modal
    [user]="selectedProfileUser()"
    [error]="userProfileError()"
    (close)="closeUserProfileModal()"
  />
}

@if (isGroupSettingsModalOpen()) {
  @if (chat(); as currentChat) {
    <app-group-settings-modal
      [chat]="currentChat"
      [title]="chatTitle()"
      [currentUserId]="currentUser()?.id ?? null"
      (close)="closeGroupSettingsModal()"
      (openUserProfile)="openUserProfile($event)"
      (chatUpdated)="handleGroupChatUpdated($event)"
    />
  }
}
