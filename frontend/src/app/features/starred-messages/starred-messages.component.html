<div class="flex h-screen bg-gray-100 text-gray-900">
  <app-sidebar class="h-full shrink-0" />

  <main class="flex min-w-0 flex-1 flex-col">
    <header class="flex items-center gap-3 border-b border-gray-200 bg-white p-4">
      <div class="flex h-10 w-10 items-center justify-center rounded-full bg-yellow-100 text-yellow-700">
        <svg lucideStar class="h-5 w-5 fill-yellow-400"></svg>
      </div>

      <div>
        <h1 class="font-semibold">Starred messages</h1>
        <p class="text-sm text-gray-500">{{ starredMessages().length }} saved</p>
      </div>
    </header>

    <section class="min-h-0 flex-1 overflow-y-auto p-6">
      @if (isLoading()) {
        <div class="flex h-full items-center justify-center text-gray-400">Loading...</div>
      } @else if (errorMessage()) {
        <div class="flex h-full items-center justify-center text-red-500">
          {{ errorMessage() }}
        </div>
      } @else if (starredMessages().length === 0) {
        <div class="flex h-full items-center justify-center text-gray-400">
          No starred messages.
        </div>
      } @else {
        <div class="overflow-hidden rounded-lg border border-gray-200 bg-white">
          @for (starredMessage of starredMessages(); track starredMessage.id) {
            <button
              type="button"
              class="flex w-full gap-4 border-b border-gray-100 p-4 text-left transition last:border-b-0 hover:bg-gray-50"
              (click)="openChat(starredMessage.chat.id)"
            >
              @if (chatService.getChatPfpUrl(starredMessage.chat)) {
                <img
                  [src]="chatService.getChatPfpUrl(starredMessage.chat)"
                  alt="Chat image"
                  class="h-11 w-11 shrink-0 rounded-full object-cover"
                />
              } @else {
                <div
                  class="flex h-11 w-11 shrink-0 items-center justify-center rounded-full bg-blue-100 font-semibold text-blue-700"
                >
                  {{ chatService.getChatTitle(starredMessage.chat).charAt(0) }}
                </div>
              }

              <div class="min-w-0 flex-1">
                <div class="flex items-start justify-between gap-3">
                  <div class="min-w-0">
                    <p class="truncate font-medium">
                      {{ chatService.getChatTitle(starredMessage.chat) }}
                    </p>
                    <p class="truncate text-xs text-gray-500">
                      {{ starredMessage.message.sender.fullName }}
                    </p>
                  </div>

                  <span class="shrink-0 text-xs text-gray-400">
                    {{ formatMessageDate(starredMessage.starredAt) }}
                  </span>
                </div>

                <p
                  class="mt-2 max-h-10 overflow-hidden whitespace-pre-wrap wrap-break-words text-sm text-gray-800"
                >
                  {{ starredMessage.message.content }}
                </p>

                <div class="mt-3 flex items-center gap-2 text-xs text-gray-500">
                  <svg lucideMessageSquare class="h-4 w-4"></svg>
                  <span>{{ formatMessageDate(starredMessage.message.createdAt) }}</span>
                </div>
              </div>
            </button>
          }
        </div>
      }
    </section>
  </main>
</div>
