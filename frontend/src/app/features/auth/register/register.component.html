<div class="flex min-h-screen items-center justify-center bg-gray-100">
  <div class="flex w-full max-w-md flex-col rounded-lg bg-white p-8 shadow-md">
    <h1 class="mb-6 text-center text-2xl font-bold">Register</h1>

    <form [formGroup]="registerForm" (ngSubmit)="handleSubmit()" class="flex flex-col gap-4">
      <div class="flex flex-col gap-1">
        <label for="firstName" class="text-sm font-medium text-gray-700"> First Name </label>
        <input
          required
          id="firstName"
          type="text"
          formControlName="firstName"
          class="rounded-md border border-gray-300 px-3 py-2 focus:border-blue-500 focus:outline-none"
          [class.border-red-500]="isInvalid('firstName')"
        />
        <!-- TODO: add invalid imports -->
      </div>
      <div class="flex flex-col gap-1">
        <label for="lastName" class="text-sm font-medium text-gray-700"> Last Name </label>
        <input
          required
          id="lastName"
          type="text"
          formControlName="lastName"
          class="rounded-md border border-gray-300 px-3 py-2 focus:border-blue-500 focus:outline-none"
          [class.border-red-500]="isInvalid('lastName')"
        />
      </div>
      <div class="flex flex-col gap-1">
        <label for="email" class="text-sm font-medium text-gray-700"> E-mail </label>
        <input
          required
          id="email"
          type="email"
          formControlName="email"
          class="rounded-md border border-gray-300 px-3 py-2 focus:border-blue-500 focus:outline-none"
          [class.border-red-500]="isInvalid('email')"
        />
      </div>
      <div class="flex flex-col gap-1">
        <label for="username" class="text-sm font-medium text-gray-700"> Username </label>
        <input
          required
          id="username"
          type="text"
          formControlName="username"
          class="rounded-md border border-gray-300 px-3 py-2 focus:border-blue-500 focus:outline-none"
          [class.border-red-500]="isInvalid('username')"
        />
      </div>
      <div class="flex flex-col gap-1">
        <label for="password" class="text-sm font-medium text-gray-700"> Password </label>
        <input
          required
          id="password"
          type="password"
          formControlName="password"
          class="rounded-md border border-gray-300 px-3 py-2 focus:border-blue-500 focus:outline-none"
          [class.border-red-500]="isInvalid('password')"
        />
      </div>
      <div class="flex flex-col gap-1">
        <label for="repeatedPassword" class="text-sm font-medium text-gray-700">
          Repeated password
        </label>
        <input
          required
          id="repeatedPassword"
          type="password"
          formControlName="repeatedPassword"
          class="rounded-md border border-gray-300 px-3 py-2 focus:border-blue-500 focus:outline-none"
          [class.border-red-500]="isInvalid('repeatedPassword')"
        />
      </div>
      <div class="flex flex-col gap-1">
        <label for="phoneNumber" class="text-sm font-medium text-gray-700"> Phone number </label>
        <input
          id="phoneNumber"
          type="text"
          formControlName="phoneNumber"
          class="rounded-md border border-gray-300 px-3 py-2 focus:border-blue-500 focus:outline-none"
          [class.border-red-500]="isInvalid('phoneNumber')"
        />
      </div>
      <div class="flex flex-col gap-1">
        <label for="pfpUrl" class="text-sm font-medium text-gray-700">
          Profile Picture (URL)
        </label>
        <input
          id="pfpUrl"
          type="text"
          formControlName="pfpUrl"
          class="rounded-md border border-gray-300 px-3 py-2 focus:border-blue-500 focus:outline-none"
          [class.border-red-500]="isInvalid('pfpUrl')"
        />
      </div>

      <button
        type="submit"
        [disabled]="!registerForm.valid"
        class="rounded-md bg-blue-600 px-4 py-2 font-medium text-white transition hover:bg-blue-700 hover:cursor-pointer disabled:bg-blue-300 disabled:hover:cursor-not-allowed"
      >
        Sign In
      </button>
    </form>
    <div class="flex gap-1 justify-center mt-3">
      <span class="text-sm font-medium text-gray-700">Have an account?</span
      ><a routerLink="/auth/login" class="text-sm font-medium text-blue-500 hover:underline"
        >Login</a
      >
    </div>
  </div>
</div>
