<div class="flex min-h-screen items-center justify-center bg-gray-100">
  <div class="flex w-full max-w-md flex-col rounded-lg bg-white p-8 shadow-md">
    <h1 class="mb-6 text-center text-2xl font-bold">
      {{ token() ? 'Change Password' : 'Reset Password' }}
    </h1>

    @if (!token()) {
      <form [formGroup]="requestForm" (ngSubmit)="requestResetLink()" class="flex flex-col gap-4">
        <div class="flex flex-col gap-1">
          <label for="identifier" class="text-sm font-medium text-gray-700">
            Username or e-mail
          </label>
          <input
            required
            id="identifier"
            type="text"
            formControlName="identifier"
            class="rounded-md border border-gray-300 px-3 py-2 focus:border-blue-500 focus:outline-none"
            [class.border-red-500]="isRequestInvalid('identifier')"
          />
        </div>

        <button
          type="submit"
          [disabled]="requestForm.invalid || isSubmitting()"
          class="rounded-md bg-blue-600 px-4 py-2 font-medium text-white transition hover:bg-blue-700 hover:cursor-pointer disabled:bg-blue-300 disabled:hover:cursor-not-allowed"
        >
          {{ isSubmitting() ? 'Sending...' : 'E-mail Reset Link' }}
        </button>
      </form>
    } @else {
      <form [formGroup]="resetForm" (ngSubmit)="resetPassword()" class="flex flex-col gap-4">
        <div class="flex flex-col gap-1">
          <label for="password" class="text-sm font-medium text-gray-700"> New password </label>
          <input
            required
            id="password"
            type="password"
            formControlName="password"
            class="rounded-md border border-gray-300 px-3 py-2 focus:border-blue-500 focus:outline-none"
            [class.border-red-500]="isResetInvalid('password')"
          />
        </div>

        <div class="flex flex-col gap-1">
          <label for="repeatedPassword" class="text-sm font-medium text-gray-700">
            Repeat new password
          </label>
          <input
            required
            id="repeatedPassword"
            type="password"
            formControlName="repeatedPassword"
            class="rounded-md border border-gray-300 px-3 py-2 focus:border-blue-500 focus:outline-none"
            [class.border-red-500]="isResetInvalid('repeatedPassword') || passwordsMismatch()"
          />
          @if (passwordsMismatch()) {
            <p class="text-xs text-red-600">Passwords do not match.</p>
          }
        </div>

        <button
          type="submit"
          [disabled]="resetForm.invalid || isSubmitting()"
          class="rounded-md bg-blue-600 px-4 py-2 font-medium text-white transition hover:bg-blue-700 hover:cursor-pointer disabled:bg-blue-300 disabled:hover:cursor-not-allowed"
        >
          {{ isSubmitting() ? 'Saving...' : 'Change Password' }}
        </button>
      </form>
    }

    @if (statusMessage(); as message) {
      <p
        class="mt-4 rounded-md px-3 py-2 text-sm"
        [class.bg-green-50]="statusType() === 'success'"
        [class.text-green-700]="statusType() === 'success'"
        [class.bg-red-50]="statusType() === 'error'"
        [class.text-red-700]="statusType() === 'error'"
      >
        {{ message }}
      </p>
    }

    <div class="mt-3 flex justify-center gap-1">
      <a routerLink="/auth/login" class="text-sm font-medium text-blue-500 hover:underline">
        Back to login
      </a>
    </div>
  </div>
</div>
