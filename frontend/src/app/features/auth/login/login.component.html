<div class="flex min-h-screen items-center justify-center bg-gray-100">
  <div class="flex w-full max-w-md flex-col rounded-lg bg-white p-8 shadow-md">
    <h1 class="mb-6 text-center text-2xl font-bold">Login</h1>

    <form [formGroup]="loginForm" (ngSubmit)="handleSubmit()" class="flex flex-col gap-4">
      <div class="flex flex-col gap-1">
        <label for="username" class="text-sm font-medium text-gray-700"> Username </label>
        <input
          id="username"
          type="text"
          formControlName="username"
          class="rounded-md border border-gray-300 px-3 py-2 focus:border-blue-500 focus:outline-none"
        />
      </div>

      <div class="flex flex-col gap-1">
        <label for="password" class="text-sm font-medium text-gray-700"> Password </label>
        <input
          id="password"
          type="password"
          formControlName="password"
          class="rounded-md border border-gray-300 px-3 py-2 focus:border-blue-500 focus:outline-none"
        />
      </div>

      <button
        type="submit"
        [disabled]="!loginForm.valid"
        class="rounded-md bg-blue-600 px-4 py-2 font-medium text-white transition hover:bg-blue-700 hover:cursor-pointer disabled:bg-blue-300 disabled:hover:cursor-not-allowed"
      >
        Sign In
      </button>
    </form>

    <div class="flex gap-1 justify-center mt-3">
      <span class="text-sm font-medium text-gray-700">Don't have an account?</span
      ><a routerLink="/auth/register" class="text-sm font-medium text-blue-500 hover:underline"
        >Register</a
      >
    </div>
    <div class="flex gap-1 justify-center mt-3">
      <span class="text-sm font-medium text-gray-700">Forgot password?</span
      ><a
        routerLink="/auth/reset-password"
        class="text-sm font-medium text-blue-500 hover:underline"
        >Reset Password</a
      >
    </div>
  </div>
</div>

@if (loginError(); as error) {
  <app-modal title="Login failed" variant="error" (close)="closeErrorModal()">
    <p class="text-sm text-gray-700">{{ error }}</p>
  </app-modal>
}
