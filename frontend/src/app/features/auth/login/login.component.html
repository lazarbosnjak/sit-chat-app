<div class="flex min-h-screen items-center justify-center bg-gray-100">
  <div class="flex w-full max-w-md flex-col rounded-lg bg-white p-8 shadow-md">
    <h1 class="mb-6 text-center text-2xl font-bold">Login</h1>

    <form [formGroup]="loginForm" (ngSubmit)="handleSubmit()" class="flex flex-col gap-4">
      <div class="flex flex-col gap-1">
        <label for="username" class="text-sm font-medium text-gray-700"> Username </label>
        <input
          id="username"
          type="text"
          formControlName="username"
          class="rounded-md border border-gray-300 px-3 py-2 focus:border-blue-500 focus:outline-none"
        />
      </div>

      <div class="flex flex-col gap-1">
        <label for="password" class="text-sm font-medium text-gray-700"> Password </label>
        <input
          id="password"
          type="password"
          formControlName="password"
          class="rounded-md border border-gray-300 px-3 py-2 focus:border-blue-500 focus:outline-none"
        />
      </div>

      <button
        type="submit"
        class="rounded-md bg-blue-600 px-4 py-2 font-medium text-white transition hover:bg-blue-700"
      >
        Sign In
      </button>
    </form>
    <div>Don't have an account? <a routerLink="/auth/register">Register</a></div>
    <div>Forgot password? <a routerLink="/auth/forgot-password">Reset password</a></div>
  </div>
</div>
