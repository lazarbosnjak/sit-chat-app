<div
  class="fixed inset-0 z-50 flex items-center justify-center bg-black/40 p-3 sm:p-4"
  (click)="closeModal()"
>
  <div
    class="flex max-h-[calc(100dvh_-_1.5rem)] w-full flex-col overflow-hidden rounded-xl bg-white shadow-lg sm:max-h-[calc(100dvh_-_2rem)]"
    [class.max-w-md]="!wide()"
    [class.max-w-2xl]="wide()"
    (click)="$event.stopPropagation()"
  >
    <header
      class="shrink-0 flex items-center justify-between rounded-t-xl border-b p-4"
      [class.border-gray-200]="variant() === 'default'"
      [class.border-red-200]="variant() === 'error'"
      [class.bg-red-50]="variant() === 'error'"
    >
      <div>
        <h2
          class="text-lg font-semibold"
          [class.text-gray-900]="variant() === 'default'"
          [class.text-red-800]="variant() === 'error'"
        >
          {{ title() }}
        </h2>
      </div>

      <button
        type="button"
        class="rounded-full px-3 py-1 text-xl transition"
        [class.text-gray-500]="variant() === 'default'"
        [class.hover:bg-gray-100]="variant() === 'default'"
        [class.text-red-700]="variant() === 'error'"
        [class.hover:bg-red-100]="variant() === 'error'"
        (click)="closeModal()"
      >
        ×
      </button>
    </header>

    <section class="min-h-0 overflow-y-auto p-4">
      <ng-content />
    </section>
  </div>
</div>
