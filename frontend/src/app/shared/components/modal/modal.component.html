<div
  class="fixed inset-0 z-50 flex items-center justify-center bg-black/40 p-4"
  (click)="closeModal()"
>
  <div
    class="w-full rounded-xl bg-white shadow-lg"
    [class.max-w-md]="!wide()"
    [class.max-w-3xl]="wide()"
    (click)="$event.stopPropagation()"
  >
    <header class="flex items-center justify-between border-b border-gray-200 p-4">
      <div>
        <h2 class="text-lg font-semibold">{{ title() }}</h2>
      </div>

      <button
        type="button"
        class="rounded-full px-3 py-1 text-xl text-gray-500 transition hover:bg-gray-100"
        (click)="closeModal()"
      >
        ×
      </button>
    </header>

    <section class="p-4">
      <ng-content />
    </section>
  </div>
</div>
